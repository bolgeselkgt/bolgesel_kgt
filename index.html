<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bölgesel KGT</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; display: flex; height: 100vh; overflow: hidden; }
        
        /* Giriş Ekranı Üslubu */
        #login-screen { width: 100%; height: 100vh; background-color: #333; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; position: absolute; z-index: 100; transition: opacity 0.5s ease; }
        #login-screen input { padding: 10px; font-size: 16px; margin: 10px 0; border: none; border-radius: 5px; }
        #login-screen button { padding: 10px 20px; font-size: 16px; background-color: #555; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #login-screen button:hover { background-color: #777; }
        
        /* Əsas Panel Üslubu */
        #dashboard { display: none; width: 100%; height: 100vh; display: flex; }
        .sidebar { width: 250px; background-color: #333; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; border-bottom: 1px solid #555; padding: 15px; margin: 0; }
        .sidebar ul { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .sidebar li { padding: 15px; border-bottom: 1px solid #444; cursor: pointer; }
        .sidebar li:hover { background-color: #555; }
        .main-content { flex-grow: 1; padding: 20px; overflow-y: auto; background-color: #f4f4f4; }
        .card { background-color: #fff; padding: 15px; margin-bottom: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .status-offline { color: red; }
        #map { height: 300px; background-color: #ddd; text-align: center; line-height: 300px; }
    </style>
</head>
<body>

    <!-- Giriş Sistemi -->
    <div id="login-screen">
        <h2>Giriş Kodu Daxil Edin</h2>
        <input type="password" id="code-input" placeholder="Məsələn: polad">
        <button onclick="checkCode()">Daxil ol</button>
    </div>

    <!-- Əsas Səhifə (Girişdən sonra görünəcək) -->
    <div id="dashboard">
        <div class="sidebar">
            <h2>Bölgesel KGT</h2>
            <ul>
                <li>Ana Səhifə</li>
                <li>Xəritə</li>
                <li>Şəxsi Heyət</li>
                <li>Sənədlər</li>
                <li>Elanlar</li>
                <li>Admin Paneli</li>
            </ul>
        </div>
        <div class="main-content">
            <div class="card">
                <h3>Xəritə Bölməsi</h3>
                <div id="map"><iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d12486598.968146535!2d47.7546666!3d40.1759948!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40307cd91aa21ddf%3A0xe6c9526b3e83cd08!2sAz%C9%99rbaycan!5e0!3m2!1saz!2saz!4v1783711440733!5m2!1saz!2saz" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe></div>
            </div>
            <div class="card">
                <h3>Şəxsi Heyət</h3>
                <table>
                    <tr>
                        <td>Əhməd Vəliyev</td>
                        <td>Leytenant</td>
                        <td><span class="status-offline">oflayn</span></td>
                    </tr>
                </table>
            </div>
            <div class="card">
                <h3>Sənədlər</h3>
                <p>Yüklənmiş sənədlərin siyahısı burada olacaq.</p>
            </div>
            <div class="card">
                <h3>Elanlar</h3>
                <p>Ümumi elanlar burada görünəcək.</p>
            </div>
        </div>
    </div>

    <script>
        function checkCode() {
            var code = document.getElementById("code-input").value;
            if (code.toLowerCase() === "polad") {
                document.getElementById("login-screen").style.opacity = "0";
                setTimeout(function() {
                    document.getElementById("login-screen").style.display = "none";
                    document.getElementById("dashboard").style.display = "flex";
                }, 500);
            } else {
                alert("Kod səhvdir!");
            }
        }
    </script>
</body>
</html>
