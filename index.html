<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REGIONAL KGT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins,sans-serif;
background:#070707;
color:white;
overflow-x:hidden;
}

/* LOGIN */

#loginPage{

width:100%;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:
linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.85)),
url("https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=1600&q=80");

background-size:cover;
background-position:center;

}

.logo{

font-family:Orbitron;
font-size:55px;
font-weight:800;
letter-spacing:8px;

margin-bottom:60px;

text-shadow:
0 0 20px #00bfff,
0 0 50px #009dff;

}

.login{

width:350px;
max-width:90%;

}

.login input{

width:100%;
padding:16px;

background:#101010;

border:1px solid #555;

border-radius:10px;

color:white;

font-size:18px;

outline:none;

}

.login button{

margin-top:20px;

width:100%;
padding:16px;

border:none;

border-radius:10px;

font-size:18px;

font-weight:bold;

background:#0094ff;

color:white;

cursor:pointer;

transition:.3s;

}

.login button:hover{

background:#006fd1;

}

.error{

margin-top:15px;

text-align:center;

color:red;

}

/* MAIN */

#main{

display:none;

}

/* SIDEBAR */

.sidebar{

position:fixed;

top:0;

left:-280px;

width:280px;

height:100%;

background:#111;

transition:.35s;

padding-top:70px;

z-index:9999;

}

.sidebar a{

display:block;

padding:17px;

text-decoration:none;

color:white;

font-size:17px;

border-bottom:1px solid #222;

}

.sidebar a:hover{

background:#0094ff;

}

.sidebar.active{

left:0;

}

.menu{

position:fixed;

top:15px;

left:15px;

font-size:30px;

cursor:pointer;

z-index:10000;

}

/* HEADER */

header{

text-align:center;

padding:30px;

font-size:30px;

font-family:Orbitron;

}

/* MAP */

.map{

width:95%;

height:450px;

margin:auto;

border-radius:15px;

overflow:hidden;

border:2px solid #444;

}

.map iframe{

width:100%;

height:100%;

border:0;

}

/* USERS */

.users{

width:95%;

margin:30px auto;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:15px;

}

.card{

background:#111;

padding:20px;

border-radius:12px;

border:1px solid #222;

}

.online{

color:#00ff5e;

font-weight:bold;

}

.offline{

color:red;

font-weight:bold;

}

/* ADMIN */

#adminPanel{

display:none;

padding:30px;

}

.adminBox{

background:#111;

padding:20px;

margin-bottom:20px;

border-radius:12px;

}

/* RESPONSIVE */

@media(max-width:768px){

.logo{

font-size:35px;

letter-spacing:4px;

}

header{

font-size:22px;

}

.map{

height:300px;

}

}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="logo">
REGIONAL KGT
</div>

<div class="login">

<input
type="password"
id="password"
placeholder="Giriş Parolu">

<button onclick="login()">
GİRİŞ
</button>

<div class="error" id="error"></div>

</div>

</div>

<!-- MAIN -->

<div id="main">

<div class="menu" onclick="menuOpen()">
☰
</div>

<div class="sidebar" id="sidebar">

<a href="#">Ana Səhifə</a>

<a href="#" onclick="admin()">Admin Paneli</a>

<a href="#">İstifadəçilər</a>

<a href="#">Sənədlər</a>

<a href="#">Elanlar</a>

<a href="#">Parametrlər</a>

</div>

<header>

REGIONAL KGT

</header>

<div class="map">

<iframe
src="https://www.openstreetmap.org/export/embed.html?bbox=44.7%2C38.2%2C50.4%2C41.9&layer=mapnik">
</iframe>

</div>

<div class="users">

<div class="card">
ÇAKIR
<br><br>
<span class="online">
🟢 ONLAYN
</span>
</div>

<div class="card">
POLAT
<br><br>
<span class="online">
🟢 ONLAYN
</span>
</div>

<div class="card">
ABDÜLEY
<br><br>
<span class="offline">
🔴 OFLAYN
</span>
</div>

</div>

<div id="adminPanel">

<div class="adminBox">

<h2>Admin Paneli</h2>

<br>

<button>İstifadəçi əlavə et</button>

<br><br>

<button>Elan paylaş</button>

<br><br>

<button>Sənəd əlavə et</button>

<br><br>

<button>Mesaj göndər</button>

</div>

</div>

</div>

<script>

let adminPassword="POLAT";

function login(){

let pass=document.getElementById("password").value.toUpperCase();

if(

pass=="ÇAKIR"||

pass=="POLAT"||

pass=="ABDÜLEY"

){

document.getElementById("loginPage").style.display="none";

document.getElementById("main").style.display="block";

window.user=pass;

}else{

document.getElementById("error").innerHTML="Parol yanlışdır";

}

}

function menuOpen(){

document.getElementById("sidebar").classList.toggle("active");

}

function admin(){

if(window.user==adminPassword){

document.getElementById("adminPanel").style.display="block";

}else{

alert("Admin panelinə giriş icazəniz yoxdur.");

}

}

</script>

</body>
</html>
