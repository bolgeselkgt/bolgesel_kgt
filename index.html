<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ KGT Portal</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial}
#girisEkrani{width:100vw;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#1e3c72 0%,#2a5298 100%)}
#girisQutu{background:white;padding:50px 40px;border-radius:20px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
#girisQutu h2{margin-top:0;color:#333}#girisQutu input{padding:12px;width:280px;border:2px solid #ddd;border-radius:8px;font-size:16px}
#girisQutu button{padding:12px 25px;margin-left:10px;border:none;background:#2a5298;color:white;border-radius:8px;cursor:pointer;font-size:16px}
#girisQutu button:hover{background:#1e3c72}#xeta{color:red;margin-top:10px;min-height:20px;font-weight:bold}
#xariteEkrani{display:none;padding:20px;background:#f5f5f5;min-height:100vh}
#ustPanel{background:white;padding:15px;border-radius:10px;margin-bottom:15px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
#map{height:75vh;width:100%;border-radius:10px;border:2px solid #ddd}
.adminBtn{background:#e74c3c;color:white;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;font-weight:bold}
.adminBtn:hover{background:#c0392b}.normalBtn{background:#3498db;color:white;border:none;padding:12px 20px;border-radius:8px;cursor:pointer}
.normalBtn:hover{background:#2980b9}
</style>
</head>
<body>
<div id="girisEkrani">
<div id="girisQutu">
<h2>🔒 AZ KGT Sistemi</h2>
<p>Sistemə daxil olmaq üçün kod daxil edin</p>
<div>
<input type="password" id="kodInput" placeholder="İcazə kodunu yaz" onkeypress="if(event.key==='Enter') girisEt()">
<button onclick="girisEt()">Daxil ol</button>
</div>
<p id="xeta"></p>
</div>
</div>
<div id="xariteEkrani">
<h1>🇦🇿 Azərbaycan KGT Portal</h1>
<div id="ustPanel">
<input type="text" id="axtarisInput" placeholder="Rayon, Kənd, Koordinat yaz" style="padding:10px;width:300px;border-radius:8px;border:1px solid #ccc">
<button class="normalBtn" onclick="axtar()">🔍 Axtar</button>
<input type="file" id="senedInput" style="display:none" onchange="senedYukle()">
<button class="normalBtn" onclick="document.getElementById('senedInput').click()">📄 Sənəd Yüklə</button>
<button id="bildirisBtn" class="adminBtn" onclick="bildirisGonder()" style="display:none">📢 Hamıya Bildiriş Göndər</button>
<button class="normalBtn" onclick="cixisEt()">🚪 Çıxış</button>
</div>
<div id="map"></div>
<p id="status" style="font-weight:bold;color:#2a5298"></p>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const ICAZE_KODLARI={"DAŞDƏMİR":"admin","SULEYMANÇAKIR":"admin","POLAT":"istifadeci","ABDULEY":"istifadeci","VİDİ":"istifadeci","MEMATİ":"istifadeci"};
let rol="";let map;let marker;
function girisEt(){const kod=document.getElementById('kodInput').value.trim().toUpperCase();const xeta=document.getElementById('xeta');if(ICAZE_KODLARI[kod]){rol=ICAZE_KODLARI[kod];document.getElementById('girisEkrani').style.display="none";document.getElementById('xariteEkrani').style.display="block";xeta.innerText="";xariteniBaslat();if(rol==="admin"){document.getElementById('bildirisBtn').style.display="inline-block";}}else{xeta.innerText="❌ Kod səhvdir! Yenidən yoxlayın.";}}
function cixisEt(){document.getElementById('xariteEkrani').style.display="none";document.getElementById('girisEkrani').style.display="flex";document.getElementById('kodInput').value="";rol="";}
function xariteniBaslat(){if(map)return;map=L.map('map').setView([40.4093,49.8671],7);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);marker=L.marker([40.4093,49.8671]).addTo(map).bindPopup("Bakı şəhəri");}
function axtar(){const q=document.getElementById('axtarisInput').value.toLowerCase().trim();document.getElementById('status').innerText=q+" axtarılır...";const yerler={"baki":[40.4093,49.8671,"Bakı şəhəri"],"sumqayit":[40.5855,49.6316,"Sumqayıt"],"gence":[40.6828,46.3606,"Gəncə"],"seki":[41.1917,47.1694,"Şəki"],"quba":[41.3593,48.5152,"Quba"],"lenkeran":[38.7556,48.8511,"Lənkəran"],"serur":[39.7636,44.9714,"Şərur"],"naxcivan":[39.2089,45.4122,"Naxçıvan"]};for(let yer in yerler){if(q.includes(yer)){map.setView([yerler[yer][0],yerler[yer][1]],10);marker.setLatLng([yerler[yer][0],yerler[yer][1]]).setPopupContent(yerler[yer][2]).openPopup();document.getElementById('status').innerText="✅ "+yerler[yer][2]+" tapıldı";return;}}document.getElementById('status').innerText="❌ Yer tapılmadı. Demo: Bakı, Gəncə, Şəki, Quba və s.";}
function bildirisGonder(){const mesaj="Polat bəy sizi ofisə çağır";alert("📢 BİLDİRİŞ GÖNDƏRİLDİ: "+mesaj);document.getElementById('status').innerText="📢 Bildiriş bütün istifadəçilərə göndərildi";}
function senedYukle(){const file=document.getElementById('senedInput').files[0];if(file){document.getElementById('status').innerText="✅ "+file.name+" seçildi";alert(file.name+" faylı seçildi. Sonra bunu serverə yükləyəcəyik");}}
</script>
</body>
</html>
